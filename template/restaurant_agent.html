<!DOCTYPE html>
<html>
    <head lang="en">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/restaurant_reg.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body>
<section class="h-100 bg-dark">
    <form action="/restaurant_submit_form" method="Post">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col">
        <div class="card card-registration my-4">
          <div class="row g-0">
            <div class="col-xl-6 d-none d-xl-block">
              <img src="../static/images/restaurant_reg_img.jpg"
                alt="Sample photo" class="img-fluid"
                style="border-top-left-radius: .25rem; border-bottom-left-radius: .25rem; height: 100%;" />
            </div>
            
            <div class="col-xl-6">
              <div class="card-body p-md-5 text-black">
                <h3 class="mb-5 text-uppercase">Signup as Restaurant</h3>

                <div class="row">
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="text" id="form3Example1m" class="form-control form-control-lg" placeholder="e.g., The Golden Spoon" name="name"/>
                      <label class="form-label" for="form3Example1m" >Restaurant Name</label>
                    </div>
                  </div>
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="text" id="form3Example1n" class="form-control form-control-lg" placeholder="e.g., Istanbul" name="city"/>
                      <label class="form-label" for="form3Example1n" >City</label>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="text" id="form3Example1m1" class="form-control form-control-lg" placeholder="e.g., 4.5" name="rating" />
                      <label class="form-label" for="form3Example1m1" >Rating</label>
                    </div>
                  </div>
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="number" id="form3Example1n1" class="form-control form-control-lg"  placeholder="e.g., 100" name="rating_count" />
                      <label class="form-label" for="form3Example1n1">Rating Count</label>
                    </div>
                  </div>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="text" id="form3Example1m1" class="form-control form-control-lg" placeholder="e.g., $$$" name="cost" />
                      <label class="form-label" for="form3Example1m1">Cost</label>
                    </div>
                  </div>
                  <div class="col-md-6 mb-4">
                    <div data-mdb-input-init class="form-outline">
                      <input type="text" id="form3Example1n1" class="form-control form-control-lg"  placeholder="e.g., Italian, Turkish" name="cuisine"/>
                      <label class="form-label" for="form3Example1n1">Cuisine</label>
                    </div>
                  </div>
                </div>
                <div data-mdb-input-init class="form-outline mb-4">
                  <input type="text" id="form3Example97" class="form-control form-control-lg" placeholder="e.g., 123456" name="lic_no"/>
                  <label class="form-label" for="form3Example97">License Number</label>
                </div>
                <div data-mdb-input-init class="form-outline mb-4">
                  <input type="text" id="form3Example8" class="form-control form-control-lg" placeholder="e.g., https://example.com" 
                  name="link"/>
                  <label class="form-label" for="form3Example8">Link</label>
                </div>
                 <div data-mdb-input-init class="form-outline mb-4">
                  <input type="text" id="form3Example8" class="form-control form-control-lg" placeholder="e.g., Kagithane, Tasci Caddesi, Bina 1" 
                  name="address"/>
                  <label class="form-label" for="form3Example8">Address</label>
                </div>
                
                <div class="d-flex justify-content-end pt-3">
                  <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-light btn-lg">Reset all</button>
                  <button  type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-warning btn-lg ms-2">Submit form</button>
                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </form>
</section>
</body>
</html>
